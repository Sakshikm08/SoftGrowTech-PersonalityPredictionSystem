<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CV Personality Analyzer</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #f5f5f5;
  --white:     #ffffff;
  --border:    #e0e0e0;
  --border-md: #cacaca;
  --text:      #1a1a1a;
  --muted:     #6b6b6b;
  --subtle:    #9a9a9a;
  --accent:    #2563eb;
  --accent-lt: #eff4ff;
  --success:   #166534;
  --success-bg:#f0fdf4;
  --success-bd:#bbf7d0;
  --error:     #991b1b;
  --error-bg:  #fef2f2;
  --error-bd:  #fecaca;
  --radius:    8px;
  --radius-lg: 12px;
  --shadow:    0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.05);
  --shadow-md: 0 4px 6px rgba(0,0,0,.07), 0 2px 4px rgba(0,0,0,.05);
}

html { scroll-behavior: smooth; }

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 14px;
  line-height: 1.5;
}

/* ── Layout ───────────────────────────────────────────────── */
.page {
  max-width: 720px;
  margin: 0 auto;
  padding: 48px 20px 80px;
}

/* ── Header ───────────────────────────────────────────────── */
.page-header {
  margin-bottom: 36px;
  padding-bottom: 24px;
  border-bottom: 1px solid var(--border);
}

.page-header h1 {
  font-size: 22px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -.3px;
  margin-bottom: 4px;
}

.page-header p {
  font-size: 13px;
  color: var(--muted);
}

/* ── Card ──────────────────────────────────────────────────── */
.card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow);
}

.card-body { padding: 24px; }

.card-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: .06em;
  margin-bottom: 16px;
}

/* ── Upload zone ───────────────────────────────────────────── */
#dropZone {
  border: 2px dashed var(--border-md);
  border-radius: var(--radius);
  padding: 36px 20px;
  text-align: center;
  cursor: pointer;
  background: var(--bg);
  transition: border-color .2s, background .2s;
}

#dropZone:hover, #dropZone.over {
  border-color: var(--accent);
  background: var(--accent-lt);
}

.drop-icon {
  width: 44px; height: 44px;
  margin: 0 auto 12px;
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: var(--shadow);
}

.drop-icon svg { color: var(--muted); }

.drop-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 4px;
}

.drop-hint {
  font-size: 12px;
  color: var(--subtle);
}

.drop-hint strong { color: var(--accent); font-weight: 500; }

#fileInput { display: none; }

/* ── File banner ──────────────────────────────────────────── */
.file-banner {
  display: none;
  align-items: center;
  gap: 8px;
  margin-top: 12px;
  padding: 10px 14px;
  background: var(--success-bg);
  border: 1px solid var(--success-bd);
  border-radius: var(--radius);
  font-size: 12px;
  color: var(--success);
  font-weight: 500;
}

.file-banner.show { display: flex; }

/* ── Error ────────────────────────────────────────────────── */
#errorBox {
  display: none;
  margin-top: 12px;
  padding: 10px 14px;
  background: var(--error-bg);
  border: 1px solid var(--error-bd);
  border-radius: var(--radius);
  font-size: 12px;
  color: var(--error);
}

#errorBox.show { display: block; }

/* ── Form row ──────────────────────────────────────────────── */
.form-row {
  display: flex;
  gap: 10px;
  margin-top: 16px;
  flex-wrap: wrap;
}

input[type="text"] {
  flex: 1;
  min-width: 160px;
  background: var(--white);
  border: 1px solid var(--border-md);
  border-radius: var(--radius);
  padding: 10px 14px;
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  outline: none;
  transition: border-color .15s, box-shadow .15s;
}

input[type="text"]::placeholder { color: var(--subtle); }

input[type="text"]:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(37,99,235,.1);
}

/* ── Buttons ───────────────────────────────────────────────── */
.btn {
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  font-weight: 600;
  padding: 10px 20px;
  border-radius: var(--radius);
  border: none;
  cursor: pointer;
  transition: background .15s, box-shadow .15s, opacity .15s;
  white-space: nowrap;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}

.btn-primary {
  background: var(--accent);
  color: #fff;
  box-shadow: 0 1px 2px rgba(37,99,235,.3);
}

.btn-primary:hover:not(:disabled) {
  background: #1d4ed8;
  box-shadow: 0 2px 6px rgba(37,99,235,.4);
}

.btn-primary:disabled { opacity: .4; cursor: not-allowed; }

.btn-outline {
  background: var(--white);
  border: 1px solid var(--border-md);
  color: var(--text);
  font-size: 12px;
  padding: 8px 14px;
}

.btn-outline:hover {
  background: var(--bg);
  border-color: var(--accent);
  color: var(--accent);
}

/* ── Loader ────────────────────────────────────────────────── */
#loader { display: none; text-align: center; padding: 40px 0; }
#loader.show { display: block; }

.spinner {
  width: 32px; height: 32px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin .7s linear infinite;
  margin: 0 auto 12px;
}

@keyframes spin { to { transform: rotate(360deg); } }
#loader p { font-size: 13px; color: var(--muted); }

/* ── Results ───────────────────────────────────────────────── */
#results { display: none; margin-top: 28px; }
#results.show { display: block; animation: fadeUp .35s ease; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* results header row */
.results-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 10px;
  margin-bottom: 20px;
}

.results-bar h2 {
  font-size: 16px;
  font-weight: 700;
  color: var(--text);
}

.results-bar h2 span { color: var(--accent); }

.btn-group { display: flex; gap: 8px; flex-wrap: wrap; }

/* dominant card */
.dominant-card {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  padding: 18px 20px;
  background: var(--accent-lt);
  border: 1px solid #bfdbfe;
  border-radius: var(--radius-lg);
  margin-bottom: 20px;
}

.dom-emoji {
  font-size: 24px;
  width: 48px; height: 48px;
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  box-shadow: var(--shadow);
}

.dom-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: .07em;
  margin-bottom: 2px;
}

.dom-name {
  font-size: 16px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 3px;
}

.dom-desc {
  font-size: 12px;
  color: var(--muted);
  line-height: 1.6;
}

/* radar */
.radar-wrap {
  display: flex;
  justify-content: center;
  padding: 24px;
  margin-bottom: 20px;
}

canvas { max-width: 280px; width: 100%; }

/* section label */
.section-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--subtle);
  text-transform: uppercase;
  letter-spacing: .08em;
  margin-bottom: 12px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}

/* trait cards */
.trait-list { display: grid; gap: 10px; }

.trait-card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 16px 18px;
  box-shadow: var(--shadow);
  transition: border-color .15s, box-shadow .15s;
  animation: fadeUp .3s ease both;
}

.trait-card:hover {
  border-color: var(--border-md);
  box-shadow: var(--shadow-md);
}

.tc-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
  gap: 8px;
}

.tc-left {
  display: flex;
  align-items: center;
  gap: 8px;
}

.tc-emoji {
  font-size: 16px;
  width: 30px; height: 30px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.tc-name {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
}

.tc-right {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}

.tc-score {
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
  font-variant-numeric: tabular-nums;
}

.badge {
  font-size: 10px;
  font-weight: 600;
  padding: 2px 7px;
  border-radius: 4px;
  letter-spacing: .04em;
  text-transform: uppercase;
}

.badge-high {
  background: #dcfce7;
  color: #166534;
}

.badge-low {
  background: #f1f5f9;
  color: #64748b;
}

.bar-track {
  height: 4px;
  background: var(--bg);
  border-radius: 100px;
  overflow: hidden;
  margin-bottom: 10px;
}

.bar-fill {
  height: 100%;
  border-radius: 100px;
  width: 0;
  background: var(--accent);
  transition: width .9s cubic-bezier(.4,0,.2,1);
}

.tc-desc {
  font-size: 12px;
  color: var(--muted);
  line-height: 1.65;
}

/* ── Divider ────────────────────────────────────────────────── */
.divider { margin: 24px 0; border: none; border-top: 1px solid var(--border); }

/* ── Responsive ────────────────────────────────────────────── */
@media (max-width: 480px) {
  .dominant-card { flex-direction: column; }
  .results-bar   { flex-direction: column; align-items: flex-start; }
  .page          { padding: 28px 16px 60px; }
}
</style>
</head>
<body>

<div class="page">

  <!-- Page header -->
  <div class="page-header">
    <h1>CV Personality Analyzer</h1>
    <p>Upload a résumé to predict Big Five personality traits using NLP keyword analysis.</p>
  </div>

  <!-- Upload card -->
  <div class="card">
    <div class="card-body">
      <div class="card-title">Upload CV</div>

      <div id="dropZone">
        <div class="drop-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
          </svg>
        </div>
        <div class="drop-title">Drag & drop your CV here</div>
        <div class="drop-hint">or <strong>click to browse</strong> &nbsp;·&nbsp; .pdf and .txt supported</div>
        <input type="file" id="fileInput" accept=".pdf,.txt"/>
      </div>

      <div class="file-banner" id="fileBanner">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
        <span id="pickedName">—</span>
      </div>

      <div id="errorBox"></div>

      <div class="form-row">
        <input type="text" id="candidateName" placeholder="Candidate name (optional)" maxlength="60"/>
        <button class="btn btn-primary" id="analyseBtn" disabled onclick="runAnalysis()">
          Analyse
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="5" y1="12" x2="19" y2="12"/>
            <polyline points="12 5 19 12 12 19"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <!-- Loader -->
  <div id="loader">
    <div class="spinner"></div>
    <p>Analysing personality traits…</p>
  </div>

  <!-- Results -->
  <div id="results">

    <div class="results-bar">
      <h2>Report &mdash; <span id="rName">Candidate</span></h2>
      <div class="btn-group">
        <button class="btn btn-outline" onclick="exportTXT()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          Export
        </button>
        <button class="btn btn-outline" onclick="resetAll()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="1 4 1 10 7 10"/>
            <path d="M3.51 15a9 9 0 1 0 .49-3.5"/>
          </svg>
          New Analysis
        </button>
      </div>
    </div>

    <!-- Dominant trait -->
    <div class="dominant-card">
      <div class="dom-emoji" id="domIco">🧠</div>
      <div>
        <div class="dom-label">Dominant Trait</div>
        <div class="dom-name" id="domName">—</div>
        <div class="dom-desc" id="domDesc">—</div>
      </div>
    </div>

    <!-- Radar chart -->
    <div class="card">
      <div class="radar-wrap">
        <canvas id="radar" width="280" height="280"></canvas>
      </div>
    </div>

    <hr class="divider"/>

    <div class="section-label">Trait Breakdown</div>

    <div class="trait-list" id="traitList"></div>

  </div><!-- /results -->

</div><!-- /page -->

<script>
const TRAIT_COLOR = "#2563eb"; // single accent — all bars same professional blue

let pickedFile = null;
let radarChart = null;
let lastResult = null;

// ── Drop zone ────────────────────────────────────────────────
const dropZone  = document.getElementById("dropZone");
const fileInput = document.getElementById("fileInput");

dropZone.addEventListener("click", () => fileInput.click());
dropZone.addEventListener("dragover", e => { e.preventDefault(); dropZone.classList.add("over"); });
dropZone.addEventListener("dragleave", () => dropZone.classList.remove("over"));
dropZone.addEventListener("drop", e => {
  e.preventDefault(); dropZone.classList.remove("over");
  if (e.dataTransfer.files[0]) setFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener("change", e => { if (e.target.files[0]) setFile(e.target.files[0]); });

function setFile(f) {
  const ext = f.name.split(".").pop().toLowerCase();
  if (!["pdf","txt"].includes(ext)) { showError("Only .pdf and .txt files are supported."); return; }
  hideError();
  pickedFile = f;
  document.getElementById("pickedName").textContent = f.name;
  document.getElementById("fileBanner").classList.add("show");
  document.getElementById("analyseBtn").disabled = false;
}

// ── Analyse ──────────────────────────────────────────────────
async function runAnalysis() {
  if (!pickedFile) return;
  hideError();
  document.getElementById("results").classList.remove("show");
  document.getElementById("loader").classList.add("show");
  document.getElementById("analyseBtn").disabled = true;

  const fd = new FormData();
  fd.append("cv_file", pickedFile);
  fd.append("candidate_name", document.getElementById("candidateName").value.trim());

  try {
    const res  = await fetch("/analyse", { method: "POST", body: fd });
    const data = await res.json();
    if (!res.ok) { showError(data.error || "Server error."); return; }
    lastResult = data;
    render(data);
  } catch {
    showError("Could not reach the server. Make sure app.py is running.");
  } finally {
    document.getElementById("loader").classList.remove("show");
    document.getElementById("analyseBtn").disabled = false;
  }
}

// ── Render ───────────────────────────────────────────────────
function render(data) {
  document.getElementById("rName").textContent   = data.candidate_name;
  document.getElementById("domIco").textContent  = data.dominant_emoji;
  document.getElementById("domName").textContent = data.dominant_trait;
  document.getElementById("domDesc").textContent = data.dominant_desc;

  const list = document.getElementById("traitList");
  list.innerHTML = "";

  data.traits.forEach((t, i) => {
    const card = document.createElement("div");
    card.className = "trait-card";
    card.style.animationDelay = `${i * 60}ms`;
    card.innerHTML = `
      <div class="tc-top">
        <div class="tc-left">
          <div class="tc-emoji">${t.emoji}</div>
          <div class="tc-name">${t.name}</div>
        </div>
        <div class="tc-right">
          <div class="tc-score">${t.score}%</div>
          <span class="badge ${t.level === "HIGH" ? "badge-high" : "badge-low"}">${t.level}</span>
        </div>
      </div>
      <div class="bar-track">
        <div class="bar-fill" id="bf${i}"></div>
      </div>
      <div class="tc-desc">${t.description}</div>
    `;
    list.appendChild(card);
    setTimeout(() => {
      document.getElementById(`bf${i}`).style.width = t.score + "%";
    }, 150 + i * 60);
  });

  drawRadar(data.traits);

  const el = document.getElementById("results");
  el.classList.add("show");
  el.scrollIntoView({ behavior: "smooth", block: "start" });
}

// ── Radar ─────────────────────────────────────────────────────
function drawRadar(traits) {
  const ctx = document.getElementById("radar").getContext("2d");
  if (radarChart) radarChart.destroy();

  radarChart = new Chart(ctx, {
    type: "radar",
    data: {
      labels: traits.map(t => t.name),
      datasets: [{
        data: traits.map(t => t.score),
        backgroundColor: "rgba(37,99,235,.08)",
        borderColor: "#2563eb",
        borderWidth: 1.5,
        pointBackgroundColor: "#2563eb",
        pointBorderColor: "#fff",
        pointBorderWidth: 1.5,
        pointRadius: 4,
        pointHoverRadius: 6,
      }]
    },
    options: {
      responsive: true,
      plugins: { legend: { display: false } },
      scales: {
        r: {
          min: 0, max: 100,
          ticks: {
            stepSize: 25,
            color: "#d1d5db",
            backdropColor: "transparent",
            font: { family: "Inter", size: 9 },
          },
          grid:        { color: "#e5e7eb" },
          angleLines:  { color: "#e5e7eb" },
          pointLabels: {
            color: "#6b7280",
            font: { family: "Inter", size: 11, weight: "600" },
          },
        }
      }
    }
  });
}

// ── Export ────────────────────────────────────────────────────
function exportTXT() {
  if (!lastResult) return;
  const d = lastResult;
  let out = `PERSONALITY PREDICTION REPORT\n`;
  out += `Candidate : ${d.candidate_name}\n`;
  out += `${"─".repeat(56)}\n\n`;
  d.traits.forEach(t => {
    const bar = "█".repeat(Math.round(t.score / 5)) + "░".repeat(20 - Math.round(t.score / 5));
    out += `${t.name.padEnd(24)} ${String(t.score).padStart(5)}%  [${bar}]  ${t.level}\n`;
    out += `  ${t.description}\n\n`;
  });
  out += `${"─".repeat(56)}\nDominant Trait : ${d.dominant_trait}\n`;

  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([out], { type: "text/plain" }));
  a.download = `${d.candidate_name.replace(/\s+/g, "_")}_personality_report.txt`;
  a.click();
}

// ── Reset ─────────────────────────────────────────────────────
function resetAll() {
  pickedFile = null;
  fileInput.value = "";
  document.getElementById("fileBanner").classList.remove("show");
  document.getElementById("analyseBtn").disabled = true;
  document.getElementById("candidateName").value = "";
  document.getElementById("results").classList.remove("show");
  hideError();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function showError(msg) {
  const el = document.getElementById("errorBox");
  el.textContent = msg;
  el.classList.add("show");
}

function hideError() {
  document.getElementById("errorBox").classList.remove("show");
}
</script>
</body>
</html>
